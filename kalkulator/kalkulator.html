<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn" aria-label="Toggle Theme">
                <span class="icon">🌙</span>
            </button>
        </div>
        
        <div class="calculator glass">
            <div class="display">
                <div class="history" id="history"></div>
                <div class="current-operand" id="display">0</div>
            </div>
            
            <div class="buttons">
                <button class="btn secondary" data-action="all-clear">AC</button>
                <button class="btn secondary" data-action="delete">DEL</button>
                <button class="btn secondary" data-operator="**">^</button>
                <button class="btn operator" data-operator="/">÷</button>
                
                <button class="btn" data-number>7</button>
                <button class="btn" data-number>8</button>
                <button class="btn" data-number>9</button>
                <button class="btn operator" data-operator="*">×</button>
                
                <button class="btn" data-number>4</button>
                <button class="btn" data-number>5</button>
                <button class="btn" data-number>6</button>
                <button class="btn operator" data-operator="-">-</button>
                
                <button class="btn" data-number>1</button>
                <button class="btn" data-number>2</button>
                <button class="btn" data-number>3</button>
                <button class="btn operator" data-operator="+">+</button>
                
                <button class="btn" data-action="percent">%</button>
                <button class="btn" data-number>0</button>
                <button class="btn" data-number>.</button>
                <button class="btn equals" data-action="calculate">=</button>
            </div>
        </div>

        <div class="history-log glass">
            <h3>History</h3>
            <ul id="history-list"></ul>
        </div>
    </div>
    
    <audio id="click-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
